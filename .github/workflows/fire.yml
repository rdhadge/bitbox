# Daily Issue Fire - fires queued issues
name: Daily Issue Fire

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-manager
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r issue-manager/requirements.txt

      - name: Authenticate gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Fire issues
        run: python issue-manager/fire.py

      - name: Commit updated queue
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add issue-manager/queue.yml issue-manager/ammunition.yml
          git diff --staged --quiet || git commit -m "chore: update queue after daily fire"
          git push
